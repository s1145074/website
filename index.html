<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Checker</title>
    <link rel="icon" type="image/x-icon" href="logo_1.ico">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>

<body>


    <button class="home" onclick="home()">
      <img src="logo_4.pdf" alt=""></img>
    </button>

    <h1>Check de code</h1>
    <p>Vul hieronder de code in die u uit de puzzel heeft gekregen.</p>

    <form onsubmit="check_input(); return false;">
        <input type="text" id="input_box" placeholder="bijv. 1234" oninput="reset_message()" />
        <button type="submit">check</button>
        
        <div id="message_container" style="display: none;">
          <p id="message"></p>
        </div>

    </form>


    <footer>Murder Mystery | Pixel Perfect | Groep 23</footer>

</body>
