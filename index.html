<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pin Code Checker</title>

    <link rel="icon" type="image/x-icon" href="logo.ico">
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>

    
    <button class="home" onclick="home()">
      <img src="logo.pdf" alt="logo">
    </button>

    <h1>Check de pincode</h1>

    <form id="pinCodeForm">
        <label for="pinCode"></label>
        <input type="text" id="pinCode" placeholder="bijv. 1234" name="pinCode" required>
        <button class="button" id="check" type="button" onclick="checkPinCode()">check</button>
    </form>


    <div id="custom-alert">
      <p id="alert-message"></p>
    </div>
  
    <script src="script.js"></script>

</body>
</html>
